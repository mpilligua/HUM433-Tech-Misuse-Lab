<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Celebration Test</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="styles.css"/>
<style>
  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    gap: 14px;
    padding: 40px;
    overflow: auto;
  }
  h1 { text-align: center; margin-bottom: 12px; }
  .test-btn {
    background: var(--accent);
    color: #000;
    font-family: 'Space Mono', monospace;
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 2px;
    padding: 14px 30px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    transition: transform 0.15s, background 0.2s;
    min-width: 280px;
  }
  .test-btn:hover { background: #d4e83e; transform: translateY(-2px); }
  .status {
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    color: var(--muted);
    margin-top: 20px;
    text-align: center;
    max-width: 500px;
    line-height: 1.7;
  }
  .status code { color: var(--accent); background: var(--surface); padding: 2px 6px; border-radius: 3px; }
</style>
</head>
<body>

<h1>Celebration <span class="accent-word">Test</span></h1>
<p style="color:var(--muted); margin-bottom: 20px; text-align: center; max-width: 500px;">
  Click any product to trigger its Duolingo-style level complete screen.
</p>

<button class="test-btn" onclick="showCompletionCelebration('printer')">PRINTER</button>
<button class="test-btn" onclick="showCompletionCelebration('airtag')">AIRTAG</button>
<button class="test-btn" onclick="showCompletionCelebration('genai')">GENAI</button>
<button class="test-btn" onclick="showCompletionCelebration('health_monitor_device')">HEALTH MONITOR</button>
<button class="test-btn" onclick="showCompletionCelebration('self_driving')">SELF DRIVING</button>
<button class="test-btn" onclick="showCompletionCelebration('social_media')">SOCIAL MEDIA</button>
<button class="test-btn" onclick="showCompletionCelebration('meta_learning')">META LEARNING</button>

<div class="status" id="status">Loading <code>js/celebration.js</code>...</div>

<script src="js/celebration.js"></script>
<script>
  const status = document.getElementById('status');
  if (typeof showCompletionCelebration === 'function') {
    status.innerHTML = '✅ <code>showCompletionCelebration</code> loaded. Click a button to test.';
  } else {
    status.innerHTML = '❌ <code>showCompletionCelebration</code> NOT FOUND. Check the path to <code>js/celebration.js</code>.';
    status.style.color = 'var(--accent2)';
  }
</script>
</body>
</html>
